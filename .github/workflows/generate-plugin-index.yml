name: Generate Plugin Index

on:
  push:
    branches:
      - main
    paths:
      - "PluginManifests/*.yml"
      - "scripts/**"
      - ".github/workflows/generate-plugin-index.yml"

permissions:
  contents: write

env:
  PLUGIN_MARKET_STATE_RELEASE_TAG: market-state
  PLUGIN_MARKET_STATE_ASSET_NAME: checksums.json

jobs:
  generate-plugin-index:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip plugin-index]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build PluginIndex.json from release checksum state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/build-plugin-index.py \
            --load-checksums-from-release \
            --strict-checksums \
            --repo "${{ github.repository }}" \
            --token "${{ github.token }}" \
            --release-tag "${{ env.PLUGIN_MARKET_STATE_RELEASE_TAG }}" \
            --asset-name "${{ env.PLUGIN_MARKET_STATE_ASSET_NAME }}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- PluginIndex.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push PluginIndex.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "135627876+github-actions[bot]@users.noreply.github.com"
          git add PluginIndex.json
          git commit -m "chore: update PluginIndex.json [skip plugin-index]"
          git push

