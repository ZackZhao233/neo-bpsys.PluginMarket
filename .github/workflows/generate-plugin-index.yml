name: Generate Plugin Index

on:
  push:
    branches:
      - main
    paths:
      - "PluginManifests/**/*.yml"
      - ".github/workflows/generate-plugin-index.yml"

permissions:
  contents: write

jobs:
  generate-plugin-index:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip plugin-index]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build PluginIndex.json
        run: python scripts/build-plugin-index.py

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet -- PluginIndex.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push PluginIndex.json
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "135627876+github-actions[bot]@users.noreply.github.com"
          git add PluginIndex.json
          git commit -m "chore: update PluginIndex.json [skip plugin-index]"
          git push
